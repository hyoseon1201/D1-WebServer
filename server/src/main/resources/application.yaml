spring:
  application:
    name: d1-server
  datasource:
    url: jdbc:mysql://localhost:3306/d1game?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: d1user
    password: d1pass1234
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    show-sql: false

server:
  port: 8080

jwt:
  secret: d1-jwt-secret-key-change-in-production-must-be-256bit
  expiration: 86400000  # 24시간 (ms)

game-server:
  api-key: d1-server-api-key-change-in-production
